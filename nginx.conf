events {
    worker_connections 1024;
}

http {
    # Map Upgrade header to Connection value so polling gets close and WS gets upgrade
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json;
    gzip_min_length 1024;

    # Rate limiting zone: 10 requests/second per IP, burst 20
    limit_req_zone $binary_remote_addr zone=global:10m rate=10r/s;
    limit_conn_zone $binary_remote_addr zone=addr:10m;

    upstream frontend {
        server term-frontend:3000;
    }

    upstream backend {
        server backend:3001;
    }

    # Docker's embedded DNS — needed so the agentelo upstreams resolve even if
    # those containers come up after nginx (variable proxy_pass forces runtime lookup).
    resolver 127.0.0.11 ipv6=off valid=30s;

    # HTTP → HTTPS redirect
    server {
        listen 80;
        server_name tim.waldin.net twald.in;
        return 301 https://$host$request_uri;
    }

    # HTTPS server
    server {
        listen 443 ssl;
        server_name tim.waldin.net twald.in;
        tcp_nodelay on;

        ssl_certificate /etc/letsencrypt/live/tim.waldin.net/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/tim.waldin.net/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        # Global rate limiting
        limit_req zone=global burst=20 nodelay;
        limit_conn addr 10;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # Block CVE-2025-29927 — Next.js middleware bypass via x-middleware-subrequest
        if ($http_x_middleware_subrequest) {
            return 403;
        }

        # Block common exploit probes
        location ~* ^/(cgi-bin|\.env|vendor|phpunit|eval-stdin|wp-admin|wp-login) {
            return 444;
        }

        # Block /health and /stats from public access
        location = /health {
            allow 127.0.0.1;
            allow 172.16.0.0/12;
            allow 10.0.0.0/8;
            deny all;
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location = /stats {
            allow 127.0.0.1;
            allow 172.16.0.0/12;
            allow 10.0.0.0/8;
            deny all;
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Admin panel — public but password-protected by the backend
        location /admin {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Socket.IO backend routes
        location /socket.io/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Socket.IO specific
            proxy_buffering off;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # Font files — immutable assets, cache aggressively.
        # Without this, nginx serves them with max-age=0 (Next.js default)
        # and browsers re-download ~2MB of font on every visit, adding
        # 400-800ms to TTI.
        location /fonts/ {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_hide_header Cache-Control;
            add_header Cache-Control "public, max-age=31536000, immutable" always;
            add_header Access-Control-Allow-Origin "*" always;
        }

        # AgentElo — read-only baseline snapshot (separate compose stack on the
        # shared `term-site_external-net` docker network). Use a variable in
        # proxy_pass so nginx defers DNS resolution to the runtime resolver
        # above rather than refusing to start when agentelo isn't running.
        set $agentelo_api  http://agentelo-api:4000;
        set $agentelo_fe   http://agentelo-frontend:3001;

        location /agentelo/api/ {
            proxy_pass $agentelo_api/agentelo/api/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location = /agentelo {
            proxy_pass $agentelo_fe/agentelo;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /agentelo/ {
            proxy_pass $agentelo_fe;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location / {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
