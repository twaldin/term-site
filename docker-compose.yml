version: '3.8'

services:
  # Nginx reverse proxy to route traffic
  nginx:
    image: nginx:alpine
    container_name: term-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

  # Next.js frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.production
    container_name: term-frontend
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:3001
    expose:
      - "3000"
    restart: unless-stopped

  # Docker Socket Proxy (Tecnativa) — no privileged containers needed
  socket-proxy:
    image: tecnativa/docker-socket-proxy:latest
    container_name: term-socket-proxy
    environment:
      - CONTAINERS=1
      - IMAGES=1
      - POST=1
      - NETWORKS=0
      - VOLUMES=0
      - SERVICES=0
      - TASKS=0
      - NODES=0
      - SWARM=0
      - BUILD=0
      - EXEC=1
      - INFO=1
      - PING=1
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - docker-net
    restart: unless-stopped

  # Terminal backend
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: term-backend
    environment:
      - NODE_ENV=production
      - FRONTEND_URL=http://frontend:3000
      - DOCKER_HOST=tcp://socket-proxy:2375
    expose:
      - "3001"
    restart: unless-stopped
    depends_on:
      - socket-proxy
    networks:
      - default
      - docker-net

networks:
  default:
    driver: bridge
  docker-net:
    driver: bridge
